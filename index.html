<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinQuest - Admin Panel</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #f0f2f5; padding: 20px; color: #1e293b; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        /* Header */
        .header { background: linear-gradient(135deg, #3b82f6, #8b5cf6); padding: 20px; border-radius: 16px; color: #fff; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 24px; }
        
        /* Login */
        .login-box { background: #fff; padding: 30px; border-radius: 16px; max-width: 400px; margin: 40px auto; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .login-box input { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; font-size: 14px; margin-bottom: 12px; }
        .login-box button { width: 100%; padding: 12px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 16px; }
        
        /* Dashboard */
        .dashboard { display: none; }
        .dashboard.show { display: block; }
        
        /* Tabs */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tabs button { padding: 10px 20px; border: 1px solid #e2e8f0; border-radius: 10px; background: #fff; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .tabs button.active { background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; border-color: transparent; }
        .tabs button:hover:not(.active) { background: #f1f5f9; }
        
        /* Tab Content */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* User Table */
        .user-table { background: #fff; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; }
        .user-table table { width: 100%; border-collapse: collapse; }
        .user-table th { background: #f1f5f9; padding: 14px; text-align: left; font-size: 12px; color: #64748b; }
        .user-table td { padding: 14px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .user-table .edit-btn { background: #3b82f6; color: #fff; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .user-table .ban-btn { background: #ef4444; color: #fff; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .user-table .unban-btn { background: #10b981; color: #fff; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .user-table .referral-list { font-size: 11px; color: #64748b; }
        
        /* Withdraw Table */
        .withdraw-table { background: #fff; border-radius: 16px; overflow: hidden; border: 1px solid #e2e8f0; }
        .withdraw-table table { width: 100%; border-collapse: collapse; }
        .withdraw-table th { background: #f1f5f9; padding: 14px; text-align: left; font-size: 12px; color: #64748b; }
        .withdraw-table td { padding: 14px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .withdraw-table .approve-btn { background: #10b981; color: #fff; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .withdraw-table .cancel-btn { background: #ef4444; color: #fff; border: none; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .withdraw-table .status-pending { color: #f59e0b; font-weight: bold; }
        .withdraw-table .status-approved { color: #10b981; font-weight: bold; }
        .withdraw-table .status-cancelled { color: #ef4444; font-weight: bold; }
        
        /* Settings Form */
        .settings-box { background: #fff; padding: 24px; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 20px; }
        .settings-box h3 { margin-bottom: 15px; }
        .settings-box label { display: block; font-weight: 600; margin-bottom: 6px; }
        .settings-box input, .settings-box textarea { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
        .settings-box button { padding: 10px 24px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 14px; }
        
        /* Edit Modal */
        .edit-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .edit-modal.show { display: flex; }
        .edit-content { background: #fff; padding: 24px; border-radius: 16px; width: 90%; max-width: 400px; }
        .edit-content input { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; margin-bottom: 12px; }
        .edit-content button { width: 100%; padding: 10px; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; font-size: 16px; margin-top: 8px; }
        .cancel-btn { background: #ef4444 !important; }
        
        /* Toast */
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: #fff; padding: 12px 24px; border-radius: 12px; font-weight: 700; z-index: 9999; display: none; font-size: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .toast.error { background: #ef4444; }
        .toast.show { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🔧 CoinQuest Admin Panel</h1>
            <span style="font-size:14px;">Logged in as Admin</span>
        </div>

        <!-- Login -->
        <div class="login-box" id="loginBox">
            <h3>Admin Login</h3>
            <input type="text" id="adminUsername" placeholder="Username">
            <input type="password" id="adminPassword" placeholder="Password">
            <button onclick="adminLogin()">Login</button>
        </div>

        <!-- Dashboard -->
        <div class="dashboard" id="dashboard">
            <!-- Tabs -->
            <div class="tabs">
                <button class="active" onclick="switchTab('users', this)">👥 Users</button>
                <button onclick="switchTab('withdraw', this)">💳 Withdraws</button>
                <button onclick="switchTab('settings', this)">⚙️ Settings</button>
            </div>

            <!-- Users Tab -->
            <div class="tab-content active" id="tabUsers">
                <h3 style="margin-bottom:15px;">👥 All Users</h3>
                <div class="user-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Username</th>
                                <th>Device ID</th>
                                <th>IP</th>
                                <th>Coins</th>
                                <th>USD</th>
                                <th>Referrals</th>
                                <th>Last Login</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Withdraw Tab -->
            <div class="tab-content" id="tabWithdraw">
                <h3 style="margin-bottom:15px;">💳 Withdraw Requests</h3>
                <div class="withdraw-table">
                    <table>
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Requested At</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="withdrawTableBody"></tbody>
                    </table>
                </div>
            </div>

            <!-- Settings Tab -->
            <div class="tab-content" id="tabSettings">
                <h3 style="margin-bottom:15px;">⚙️ Settings</h3>
                
                <!-- Withdraw Settings -->
                <div class="settings-box">
                    <h3>💸 Withdraw Settings</h3>
                    <label>Minimum Withdraw Amount (USD)</label>
                    <input type="number" id="minWithdraw" placeholder="e.g. 10">
                    <button onclick="saveWithdrawSettings()">Save</button>
                </div>

                <!-- Video Settings -->
                <div class="settings-box">
                    <h3>📺 Video Settings</h3>
                    <label>Daily Video Limit</label>
                    <input type="number" id="videoLimit" placeholder="e.g. 5">
                    <label>Coins per Video</label>
                    <input type="number" id="videoReward" placeholder="e.g. 10">
                    <button onclick="saveVideoSettings()">Save</button>
                </div>

                <!-- Ad Code Settings -->
                <div class="settings-box">
                    <h3>📢 Ad Code</h3>
                    <label>Enter Ad Code (Users will watch this ad to earn coins)</label>
                    <textarea id="adCode" rows="4" placeholder="<script src='...'></script>"></textarea>
                    <button onclick="saveAdCode()">Save Ad Code</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="edit-modal" id="editModal">
        <div class="edit-content">
            <h3>Edit User Balance</h3>
            <input type="hidden" id="editUserId">
            <label>New Balance (Coins)</label>
            <input type="number" id="editBalance">
            <button onclick="saveEdit()">Save Changes</button>
            <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== FIREBASE ====================
        const firebaseConfig = {
            apiKey: "AIzaSyAqCNHhu9oaBDea85tAH-iHucHczZnR7nY",
            authDomain: "tolaka-exc-reverb-b1afd.firebaseapp.com",
            databaseURL: "https://tolaka-exc-reverb-b1afd-default-rtdb.firebaseio.com",
            projectId: "tolaka-exc-reverb-b1afd",
            storageBucket: "tolaka-exc-reverb-b1afd.appspot.com",
            messagingSenderId: "25114300036",
            appId: "1:25114300036:android:579e5c869a075113603cd1"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ==================== TOAST ====================
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            if (type === 'error') toast.classList.add('error');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ==================== ADMIN LOGIN ====================
        function adminLogin() {
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            if (username === 'admin' && password === 'admin123') {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dashboard').classList.add('show');
                loadAllUsers();
                loadAllWithdraws();
                loadSettings();
                showToast('✅ Logged in successfully!');
            } else {
                showToast('❌ Invalid credentials!', 'error');
            }
        }

        // ==================== TAB SWITCH ====================
        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(el => el.classList.remove('active'));
            document.getElementById('tab' + tabId.charAt(0).toUpperCase() + tabId.slice(1)).classList.add('active');
            btn.classList.add('active');
            
            if (tabId === 'withdraw') loadAllWithdraws();
            if (tabId === 'settings') loadSettings();
        }

        // ==================== LOAD USERS ====================
        function loadAllUsers() {
            db.ref('users').on('value', (snapshot) => {
                const users = snapshot.val();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';
                if (!users) {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:#64748b;">No users found</td></tr>';
                    return;
                }
                Object.keys(users).forEach((uid) => {
                    const user = users[uid];
                    const referrals = user.referrals ? Object.values(user.referrals).length : 0;
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${user.username || 'Unknown'}</td>
                        <td>${user.deviceId || 'N/A'}</td>
                        <td>${user.ip || 'N/A'}</td>
                        <td>${user.balance || 0}</td>
                        <td>$${(user.usdBalance || 0).toFixed(2)}</td>
                        <td class="referral-list">${referrals}</td>
                        <td>${user.lastLogin ? new Date(user.lastLogin).toLocaleString() : 'Never'}</td>
                        <td>
                            <button class="edit-btn" onclick="openEditModal('${uid}', ${user.balance || 0})">Edit</button>
                            ${user.isBanned ? 
                                `<button class="unban-btn" onclick="toggleBan('${uid}', false)">Unban</button>` : 
                                `<button class="ban-btn" onclick="toggleBan('${uid}', true)">Ban</button>`
                            }
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            });
        }

        // ==================== EDIT USER BALANCE ====================
        function openEditModal(uid, currentBalance) {
            document.getElementById('editUserId').value = uid;
            document.getElementById('editBalance').value = currentBalance;
            document.getElementById('editModal').classList.add('show');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('show');
        }

        function saveEdit() {
            const uid = document.getElementById('editUserId').value;
            const newBalance = parseInt(document.getElementById('editBalance').value);
            if (isNaN(newBalance)) {
                showToast('Please enter a valid number!', 'error');
                return;
            }
            db.ref('users/' + uid).update({ balance: newBalance }).then(() => {
                showToast('✅ Balance updated successfully!');
                closeEditModal();
            }).catch((e) => showToast('Error: ' + e.message, 'error'));
        }

        // ==================== BAN / UNBAN ====================
        function toggleBan(uid, ban) {
            db.ref('users/' + uid).update({ isBanned: ban }).then(() => {
                showToast(ban ? '✅ User banned!' : '✅ User unbanned!');
            });
        }

        // ==================== WITHDRAW SYSTEM ====================
        function loadAllWithdraws() {
            db.ref('withdrawRequests').on('value', (snapshot) => {
                const requests = snapshot.val();
                const tbody = document.getElementById('withdrawTableBody');
                tbody.innerHTML = '';
                if (!requests) {
                    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:#64748b;">No withdraw requests</td></tr>';
                    return;
                }
                Object.keys(requests).reverse().forEach((id) => {
                    const req = requests[id];
                    const statusClass = req.status === 'pending' ? 'status-pending' : req.status === 'approved' ? 'status-approved' : 'status-cancelled';
                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${req.username || 'User'}</td>
                        <td>$${req.amount.toFixed(2)}</td>
                        <td class="${statusClass}">${req.status.toUpperCase()}</td>
                        <td>${req.requestedAt ? new Date(req.requestedAt).toLocaleString() : 'Unknown'}</td>
                        <td>
                            ${req.status === 'pending' ? 
                                `<button class="approve-btn" onclick="approveWithdraw('${id}', ${req.amount})">Approve</button>
                                 <button class="cancel-btn" onclick="cancelWithdraw('${id}')">Cancel</button>` : 
                                req.status === 'approved' ? 
                                '<span style="color:#10b981;">✅ Approved</span>' :
                                `<span style="color:#ef4444;">❌ Cancelled</span>`
                            }
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            });
        }

        function approveWithdraw(id, amount) {
            if (!confirm('Approve this withdrawal?')) return;
            db.ref('withdrawRequests/' + id).update({ status: 'approved' }).then(() => {
                showToast('✅ Withdrawal approved!');
            });
        }

        function cancelWithdraw(id) {
            const reason = prompt('Enter cancellation reason:');
            if (reason === null) return;
            db.ref('withdrawRequests/' + id).once('value', (snap) => {
                const req = snap.val();
                if (req && req.userId) {
                    // Refund the amount to user
                    db.ref('users/' + req.userId + '/usdBalance').transaction((current) => {
                        return (current || 0) + req.amount;
                    }).then(() => {
                        db.ref('withdrawRequests/' + id).update({ 
                            status: 'cancelled', 
                            cancelReason: reason 
                        }).then(() => {
                            showToast('❌ Withdrawal cancelled. Refunded $' + req.amount.toFixed(2));
                        });
                    });
                }
            });
        }

        // ==================== SETTINGS ====================
        function loadSettings() {
            // Withdraw settings
            db.ref('withdrawSettings').once('value', (snap) => {
                const data = snap.val() || {};
                document.getElementById('minWithdraw').value = data.minAmount || 10;
            });

            // Video settings
            db.ref('videoSettings').once('value', (snap) => {
                const data = snap.val() || {};
                document.getElementById('videoLimit').value = data.dailyLimit || 5;
                document.getElementById('videoReward').value = data.reward || 10;
            });

            // Ad code
            db.ref('adCode').once('value', (snap) => {
                const code = snap.val() || '';
                document.getElementById('adCode').value = code;
            });
        }

        function saveWithdrawSettings() {
            const minAmount = parseFloat(document.getElementById('minWithdraw').value);
            if (isNaN(minAmount) || minAmount < 0) {
                showToast('Please enter a valid amount!', 'error');
                return;
            }
            db.ref('withdrawSettings').set({ minAmount }).then(() => {
                showToast('✅ Withdraw settings saved!');
            });
        }

        function saveVideoSettings() {
            const dailyLimit = parseInt(document.getElementById('videoLimit').value);
            const reward = parseInt(document.getElementById('videoReward').value);
            if (isNaN(dailyLimit) || isNaN(reward) || dailyLimit < 0 || reward < 0) {
                showToast('Please enter valid numbers!', 'error');
                return;
            }
            db.ref('videoSettings').set({ dailyLimit, reward }).then(() => {
                showToast('✅ Video settings saved!');
            });
        }

        function saveAdCode() {
            const code = document.getElementById('adCode').value.trim();
            if (!code) {
                showToast('Please enter an ad code!', 'error');
                return;
            }
            db.ref('adCode').set(code).then(() => {
                showToast('✅ Ad code saved!');
            });
        }

        // ==================== START ====================
        document.addEventListener('DOMContentLoaded', function() {
            // Auto-login if already logged in (optional)
        });
    </script>
</body>
</html>
